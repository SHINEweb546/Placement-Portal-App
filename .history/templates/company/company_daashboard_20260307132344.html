<!DOCTYPE html>
<html>
<head>
    <title>Company Dashboard</title>
</head>

<body>

<h1>Company Dashboard</h1>

<a href="{{ url_for('company/add_job') }}">
    <button type="button" class="btn btn-primary w-200">Add New Job</button>
</a>

<h2>Your Jobs</h2>

<table border="1">

<tr>
<th>Title</th>
<th>Description</th>
<th>Actions</th>
</tr>

{% for job in jobs %}

<tr>

<td>{{ job.title }}</td>

<td>{{ job.description }}</td>

<td>

<a href="{{ url_for('edit_job_company', id=job.id) }}">
<button>Edit</button>
</a>

<a href="{{ url_for('delete_job_company', id=job.id) }}">
<button>Delete</button>
</a>

</td>

</tr>

{% endfor %}

</table>

</body>
</html>
